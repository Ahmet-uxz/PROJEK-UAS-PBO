{% extends "base.html" %}
{% block title %}Masuk – Smart Waste Classifier{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-box__logo">♻</div>
    <h1 class="auth-box__title">Selamat Datang</h1>
    <p class="auth-box__sub">Masuk untuk mengakses layanan penjemputan sampahmu</p>

    {% if error %}
    <div class="alert alert--error" style="margin-bottom:1rem;">
      <span class="alert__icon">⚠</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form__group">
        <label class="form__label" for="username">Username</label>
        <input class="form__input" type="text" id="username" name="username"
               placeholder="Masukkan username" value="{{ username_val }}" required/>
      </div>
      <div class="form__group">
        <label class="form__label" for="password">Password</label>
        <input class="form__input" type="password" id="password" name="password"
               placeholder="Masukkan password" required/>
      </div>
      <button class="btn btn--primary btn--full" style="margin-top:.5rem" type="submit">Masuk</button>
    </form>

    <hr class="auth-box__divider"/>
    <p class="auth-box__footer">
      Belum punya akun? <a href="{{ url_for('register') }}">Daftar sekarang</a>
    </p>
  </div>
</div>
{% endblock %}
